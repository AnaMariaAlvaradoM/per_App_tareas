<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova</title>
<link rel="stylesheet" href="/style.css">>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo-row">
        <div class="logo">N</div>
        <span class="logo-name">Nova</span>
        <span class="dot-live"></span>
      </div>
      <div class="progress-row">
        <div class="ring-wrap">
          <svg viewBox="0 0 40 40">
            <circle class="ring-bg" cx="20" cy="20" r="16"/>
            <circle class="ring-fill" id="ringFill" cx="20" cy="20" r="16"/>
          </svg>
          <div class="ring-num" id="ringNum">0%</div>
        </div>
        <div class="progress-meta">
          <div class="progress-label">Completadas</div>
          <div class="progress-count" id="progCount">0 <span>/ 0</span></div>
        </div>
      </div>
    </div>

    <div class="task-list" id="taskList">
      <div class="no-tasks">Cuéntale a Nova qué tienes pendiente</div>
    </div>
    <div class="sidebar-footer">
      <button class="footer-btn" onclick="clearDone()">Limpiar hechas</button>
      <button class="footer-btn" onclick="clearAll()">Borrar todo</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <button class="mob-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        Tareas
      </button>
      <span class="topbar-label">Asistente personal</span>
      <span class="topbar-date" id="topDate"></span>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="w-icon">N</div>
        <h2>Hola, soy Nova</h2>
        <p>Tu asistente personal. Cuéntame qué tienes pendiente o pregúntame cómo vas.</p>
        <div class="sugs">
          <div class="sug" onclick="sendSug(this)">¿Cómo voy hoy?</div>
          <div class="sug" onclick="sendSug(this)">Agregar una tarea</div>
          <div class="sug" onclick="sendSug(this)">¿Qué hago primero?</div>
          <div class="sug" onclick="sendSug(this)">Ver mis tareas</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="msgInput" placeholder="Escríbele a Nova..." rows="1"></textarea>
        <div class="btns">
          <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Hablar por micrófono">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="9" y="2" width="6" height="11" rx="3"/>
              <path d="M5 10a7 7 0 0 0 14 0"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="9" y1="22" x2="15" y2="22"/>
            </svg>
          </button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
      <div class="input-hint">Enter para enviar &middot; Shift+Enter para nueva línea</div>
    </div>
  </main>
</div>

<script>
// === NOVA ULTRA ROBUSTA - SIEMPRE FUNCIONA ===
var hist = [], isLoading = false, tasks = [], STORAGE_KEY = 'nova_tasks_v2';

function saveTasks() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    console.log('✅ Tasks guardadas:', tasks.length);
  } catch(e) { console.error('❌ Save error:', e); }
}

function loadTasks() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      tasks = JSON.parse(stored).map(t => ({...t, id: t.id || Date.now() + Math.random()}));
      console.log('✅ Tasks cargadas desde local:', tasks.length);
    }
    updateUI();
  } catch(e) {
    console.error('❌ Load error, reset:', e);
    tasks = []; saveTasks(); updateUI();
  }
}

function updateUI() {
  const pct = tasks.length ? Math.round((tasks.filter(t => t.done).length / tasks.length) * 100) : 0;
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  
  // Progress ring
  const circ = 2 * Math.PI * 16;
  document.getElementById('ringFill').style.strokeDasharray = circ;
  document.getElementById('ringFill').style.strokeDashoffset = circ - (pct/100)*circ;
  document.getElementById('ringNum').textContent = pct + '%';
  document.getElementById('progCount').innerHTML = done + ' <span>/ ' + total + '</span>';

  const el = document.getElementById('taskList');
  if (!tasks.length) { 
    el.innerHTML = '<div class="no-tasks">Sin tareas aún.</div>'; 
    return; 
  }
  
  const pending = tasks.filter(t => !t.done);
  const dones = tasks.filter(t => t.done);
  let h = '';
  
  if (pending.length) {
    h += '<div class="section-label">Pendientes</div>';
    pending.forEach(t => {
      h += `<div class="task-row" onclick="toggleTask(${t.id})">
        <div class="t-check">${t.done ? '<svg viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg>' : ''}</div>
        <div class="t-name">${escapeHtml(t.name)}</div>
        <button class="del-btn" onclick="event.stopPropagation(); delTask(${t.id})" title="Eliminar">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button></div>`;
    });
  }
  if (dones.length) {
    h += '<div class="section-label" style="margin-top:6px">Hechas</div>';
    dones.forEach(t => {
      h += `<div class="task-row done">
        <div class="t-check"><svg viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg></div>
        <div class="t-name">${escapeHtml(t.name)}</div>
        <button class="del-btn" onclick="event.stopPropagation(); delTask(${t.id})" title="Eliminar">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button></div>`;
    });
  }
  el.innerHTML = h;
}

function toggleTask(id) {
  const task = tasks.find(t => t.id == id);
  if (task) {
    task.done = !task.done;
    saveTasks();
    updateUI();
    addMsg('ai', task.done ? '✅ Tarea completada' : '↻ Tarea reabierta', null);
    console.log('🔄 Task toggled:', id, task.done);
  }
}

function delTask(id) {
  tasks = tasks.filter(t => t.id != id);
  saveTasks();
  updateUI();
  addMsg('ai', '🗑️ Tarea eliminada', null);
  console.log('🗑️ Task deleted:', id);
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  saveTasks();
  updateUI();
  addMsg('ai', 'Limpié las completadas.', null);
}

function clearAll() {
  if (!confirm('¿Borrar TODO?')) return;
  tasks = [];
  saveTasks();
  updateUI();
  addMsg('ai', 'Todo borrado. ¡Lista nueva!', null);
}

// === CHAT (mantiene APIs pero con fallback local) ===
const DAYS = ['domingo','lunes','miércoles','jueves','viernes','sábado'];
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
document.getElementById('topDate').textContent = `${DAYS[new Date().getDay()]}, ${new Date().getDate()} de ${MONTHS[new Date().getMonth()]}`;

async function sendMessage() {
  if (isLoading) return;
  const inp = document.getElementById('msgInput'), text = inp.value.trim();
  if (!text) return;
  
  const w = document.getElementById('welcome'); if (w) w.remove();
  inp.value = ''; inp.style.height = 'auto';
  addMsg('user', text, null); hist.push({role:'user', content:text});
  
  showTyping(); isLoading = true; document.getElementById('sendBtn').disabled = true;
  
  try {
    // Intenta API real
    const r = await fetch('/api/chat', { 
      method:'POST', 
      headers:{'Content-Type':'application/json'}, 
      body: JSON.stringify({ messages: hist }) 
    });
    const d = await r.json();
    
    // Extrae tareas de respuesta AI (parsea ACTION)
    if (d.action_result && d.action_result.includes('agregada')) {
      const newTaskName = text.match(/tarea[:\s]+(.+)/i)?.[1] || 'Nueva tarea';
      tasks.push({id: Date.now(), name: newTaskName.trim(), done: false});
      saveTasks();
    }
    
    removeTyping();
    addMsg('ai', d.message, d.action_result);
    hist.push({role:'assistant', content: d.message});
    
  } catch(e) {
    // FALLBACK LOCAL: Nova simple
    console.warn('🌐 API falló, modo local');
    removeTyping();
    let response = '¡Listo! ';
    
    if (text.toLowerCase().includes('tarea') || text.includes('agregar')) {
      const taskName = text.replace(/^(agrega?|crea?|nueva?\s+tarea?[:\s]*)/i, '').trim() || 'Tarea nueva';
      tasks.unshift({id: Date.now(), name: taskName, done: false});
      saveTasks();
      response += `Agregué "${taskName}" ✅`;
    } else if (text.toLowerCase().includes('complet') || text.includes('hecho')) {
      const pending = tasks.find(t => !t.done);
      if (pending) {
        pending.done = true;
        saveTasks();
        response += `Marcada "${pending.name}" como hecha 🎉`;
      } else response += 'No hay pendientes.';
    } else if (text.toLowerCase().includes('lista') || text.includes('tareas')) {
      const pending = tasks.filter(t => !t.done);
      response += pending.length ? `Tienes ${pending.length} pendientes.` : '¡Estás al día! ✨';
    } else {
      response += 'Dime qué tarea agregar o qué completar 😊';
    }
    
    addMsg('ai', response, null);
  }
  
  isLoading = false; document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
  updateUI();
}

// Utils (mantener igual)
function addMsg(role, text, action) {
  const c = document.getElementById('messages'), div = document.createElement('div');
  div.className = 'message ' + role;
  const isAi = role === 'ai';
  div.innerHTML = `
    <div class="msg-av ${isAi ? 'ai' : 'me'}">${isAi ? 'N' : 'Tú'}</div>
    <div class="msg-body">
      <div class="msg-who">${isAi ? 'Nova' : 'Tú'}</div>
      <div class="msg-bubble">${fmt(text)}</div>
      ${action ? `<div class="action-tag">⚡ ${escapeHtml(action)}</div>` : ''}
    </div>`;
  c.appendChild(div); c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('messages'), div = document.createElement('div');
  div.className = 'message ai'; div.id = 'typing';
  div.innerHTML = '<div class="msg-av ai">N</div><div class="msg-body"><div class="msg-who">Nova</div><div class="msg-bubble typing-dots"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div></div>';
  c.appendChild(div); c.scrollTop = c.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function fmt(t) {
  return escapeHtml(t)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:#ffffff08;padding:1px 6px;border-radius:4px;font-family:DM Mono,monospace;font-size:12px">$1</code>')
    .replace(/\n/g, '<br>');
}

function escapeHtml(t) { 
  const div = document.createElement('div'); 
  div.textContent = t; 
  return div.innerHTML; 
}

function sendSug(el) { 
  document.getElementById('msgInput').value = el.textContent; 
  sendMessage(); 
}

// Input events
document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});
document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// INIT
loadTasks();
console.log('🚀 Nova Robust iniciada - Revisa console para logs');
</script>
</body>
</html>
