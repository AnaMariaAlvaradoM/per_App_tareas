<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1f1f24;
    --border: #26262e;
    --accent: #64b5f6;
    --accent2: #42a5f5;
    --accent-dim: #42a5f512;
    --text: #e8e8ec;
    --text-sub: #9494a0;
    --text-dim: #55555f;
    --user-bubble: #1a1a22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-size: 15px;
  }

  body::before {
    content: '';
    position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, #42a5f508 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── CONTENEDOR CENTRADO ── */
  .app {
    width: 100%;
    max-width: 960px;
    height: 92vh;
    max-height: 820px;
    display: flex;
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    background: var(--bg);
    box-shadow: 0 24px 80px #00000060;
    position: relative;
    z-index: 1;
    margin: 0 16px;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .sidebar-top {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo-row {
    display: flex; align-items: center; gap: 9px; margin-bottom: 18px;
  }

  .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--accent2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #0f0f11; flex-shrink: 0;
  }

  .logo-name { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }

  .dot-live {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); margin-left: auto;
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* progress */
  .progress-row { display: flex; align-items: center; gap: 10px; }

  .ring-wrap { position: relative; width: 40px; height: 40px; flex-shrink: 0; }
  .ring-wrap svg { width: 40px; height: 40px; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 3; }
  .ring-fill {
    fill: none; stroke: var(--accent2); stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 100.5;
    stroke-dashoffset: 100.5;
    transition: stroke-dashoffset 0.6s ease;
  }
  .ring-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; color: var(--accent);
    font-family: 'DM Mono', monospace;
  }

  .progress-meta { flex: 1; }
  .progress-label { font-size: 11px; color: var(--text-dim); margin-bottom: 1px; }
  .progress-count { font-size: 19px; font-weight: 600; letter-spacing: -0.5px; }
  .progress-count span { font-size: 12px; font-weight: 400; color: var(--text-dim); }

  /* task list */
  .task-list {
    flex: 1; overflow-y: auto; padding: 10px 0;
  }
  .task-list::-webkit-scrollbar { width: 2px; }
  .task-list::-webkit-scrollbar-thumb { background: var(--border); }

  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    color: var(--text-dim); text-transform: uppercase;
    padding: 8px 18px 4px;
  }

  .task-row {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 7px 18px; cursor: pointer; transition: background 0.12s;
  }
  .task-row:hover { background: var(--surface2); }
  .task-row.done { opacity: 0.38; cursor: default; }

  .t-check {
    width: 15px; height: 15px; border-radius: 4px;
    border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .task-row:not(.done):hover .t-check { border-color: var(--accent2); }
  .task-row.done .t-check { background: var(--accent2); border-color: var(--accent2); }
  .t-check svg { width: 8px; height: 8px; stroke: #0f0f11; stroke-width: 2.5; fill: none; display: none; }
  .task-row.done .t-check svg { display: block; }

  .t-name { font-size: 13px; line-height: 1.4; color: var(--text); word-break: break-word; }
  .task-row.done .t-name { text-decoration: line-through; color: var(--text-dim); }

  .no-tasks { padding: 20px 18px; font-size: 12px; color: var(--text-dim); line-height: 1.6; }

  .task-row { position: relative; }
  .del-btn {
    opacity: 0; position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; border-radius: 5px; border: none;
    background: transparent; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .task-row:hover .del-btn { opacity: 1; }
  .del-btn:hover { background: #ef535020; color: #ef5350; }
  .del-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }

  .sidebar-footer {
    padding: 10px 14px; border-top: 1px solid var(--border);
    display: flex; gap: 6px; flex-shrink: 0;
  }
  .footer-btn {
    flex: 1; padding: 7px 8px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-dim); font-family: 'DM Sans', sans-serif;
    font-size: 11px; cursor: pointer; transition: all .15s; text-align: center;
  }
  .footer-btn:hover { border-color: #ef5350; color: #ef5350; background: #ef535010; }

  /* ── MAIN ── */
  .main {
    flex: 1; display: flex; flex-direction: column; min-width: 0;
  }

  .topbar {
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    flex-shrink: 0;
  }

  .topbar-label { font-size: 13px; color: var(--text-sub); font-weight: 400; }
  .topbar-date {
    margin-left: auto; font-size: 11px; color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  .mob-menu { display: none; }

  /* messages */
  .messages {
    flex: 1; overflow-y: auto;
    padding: 22px; display: flex; flex-direction: column;
    gap: 18px; scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); }

  .message { display: flex; gap: 10px; animation: fadeUp .2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .message.user { flex-direction: row-reverse; }

  .msg-av {
    width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; margin-top: 2px;
  }
  .msg-av.ai { background: var(--accent2); color: #0f0f11; }
  .msg-av.me { background: var(--surface2); border: 1px solid var(--border); color: var(--text-sub); font-size: 10px; }

  .msg-body { display: flex; flex-direction: column; gap: 3px; max-width: 80%; }
  .message.user .msg-body { align-items: flex-end; }

  .msg-who { font-size: 10px; color: var(--text-dim); padding: 0 2px; font-weight: 500; }

  .msg-bubble {
    padding: 11px 15px; border-radius: 14px;
    font-size: 14px; line-height: 1.65; word-break: break-word;
  }
  .message.ai .msg-bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .message.user .msg-bubble {
    background: var(--user-bubble); border: 1px solid var(--border);
    border-top-right-radius: 4px;
  }

  .action-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--accent-dim); border: 1px solid #42a5f520;
    color: var(--accent); font-size: 10px; font-family: 'DM Mono', monospace;
    padding: 3px 9px; border-radius: 20px; margin-top: 4px;
  }

  .typing-dots { display: flex; gap: 4px; padding: 13px 15px; align-items: center; }
  .t-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); animation: tdot 1.2s infinite; }
  .t-dot:nth-child(2){animation-delay:.2s} .t-dot:nth-child(3){animation-delay:.4s}
  @keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-5px);opacity:1} }

  /* welcome */
  .welcome {
    margin: auto; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    max-width: 360px; padding: 20px;
  }
  .w-icon {
    width: 52px; height: 52px; border-radius: 15px;
    background: var(--accent2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #0f0f11;
    box-shadow: 0 0 40px #42a5f520;
  }
  .welcome h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .welcome p { font-size: 13px; color: var(--text-sub); line-height: 1.7; }
  .sugs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 4px; }
  .sug {
    padding: 6px 13px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; font-size: 12px; color: var(--text-sub);
    cursor: pointer; transition: all .15s;
  }
  .sug:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-dim); }

  /* input */
  .input-area {
    padding: 12px 22px 16px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }

  .input-box {
    display: flex; gap: 7px; align-items: flex-end;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 13px; padding: 9px 11px;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-box:focus-within {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px #42a5f510;
  }

  #msgInput {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; resize: none; max-height: 110px; line-height: 1.5; padding: 1px 0;
  }
  #msgInput::placeholder { color: var(--text-dim); }

  .btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  .mic-btn {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--surface2); border: 1.5px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .15s; color: var(--text-sub); flex-shrink: 0;
  }
  .mic-btn:hover { border-color: var(--accent2); color: var(--accent); }
  .mic-btn.rec { background: #ef535015; border-color: #ef5350; color: #ef5350; animation: micpulse 1s infinite; }
  @keyframes micpulse { 0%,100%{box-shadow:0 0 0 0 #ef535030} 50%{box-shadow:0 0 0 5px transparent} }
  .mic-btn svg { width: 14px; height: 14px; }

  .send-btn {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent2); border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
    box-shadow: 0 2px 10px #42a5f530;
  }
  .send-btn:hover { background: var(--accent); }
  .send-btn:active { transform: scale(.92); }
  .send-btn:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }
  .send-btn svg { width: 13px; height: 13px; fill: #0f0f11; }

  .input-hint { font-size: 10px; color: var(--text-dim); margin-top: 7px; text-align: center; }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    body { align-items: flex-start; }
    .app { margin: 0; max-width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; border: none; }
    .sidebar { display: none; position: fixed; inset: 0; width: 260px; z-index: 100; border-radius: 0 16px 16px 0; }
    .sidebar.open { display: flex; }
    .mob-menu { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px; font-size: 11px; color: var(--text-sub); cursor: pointer; margin-right: 8px; }
    .mob-menu:hover { border-color: var(--accent2); color: var(--text); }
    .topbar-date { display: none; }
    .messages { padding: 14px; }
    .input-area { padding: 10px 14px 14px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo-row">
        <div class="logo">N</div>
        <span class="logo-name">Nova</span>
        <span class="dot-live"></span>
      </div>
      <div class="progress-row">
        <div class="ring-wrap">
          <svg viewBox="0 0 40 40">
            <circle class="ring-bg" cx="20" cy="20" r="16"/>
            <circle class="ring-fill" id="ringFill" cx="20" cy="20" r="16"/>
          </svg>
          <div class="ring-num" id="ringNum">0%</div>
        </div>
        <div class="progress-meta">
          <div class="progress-label">Completadas</div>
          <div class="progress-count" id="progCount">0 <span>/ 0</span></div>
        </div>
      </div>
    </div>

    <div class="task-list" id="taskList">
      <div class="no-tasks">Cuéntale a Nova qué tienes pendiente</div>
    </div>
    <div class="sidebar-footer">
      <button class="footer-btn" onclick="clearDone()">Limpiar hechas</button>
      <button class="footer-btn" onclick="clearAll()">Borrar todo</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <button class="mob-menu" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        Tareas
      </button>
      <span class="topbar-label">Asistente personal</span>
      <span class="topbar-date" id="topDate"></span>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="w-icon">N</div>
        <h2>Hola, soy Nova</h2>
        <p>Tu asistente personal. Cuéntame qué tienes pendiente o pregúntame cómo vas.</p>
        <div class="sugs">
          <div class="sug" onclick="sendSug(this)">¿Cómo voy hoy?</div>
          <div class="sug" onclick="sendSug(this)">Agregar una tarea</div>
          <div class="sug" onclick="sendSug(this)">¿Qué hago primero?</div>
          <div class="sug" onclick="sendSug(this)">Ver mis tareas</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="msgInput" placeholder="Escríbele a Nova..." rows="1"></textarea>
        <div class="btns">
          <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Hablar por micrófono">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="9" y="2" width="6" height="11" rx="3"/>
              <path d="M5 10a7 7 0 0 0 14 0"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="9" y1="22" x2="15" y2="22"/>
            </svg>
          </button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
      <div class="input-hint">Enter para enviar &middot; Shift+Enter para nueva línea</div>
    </div>
  </main>
</div>

<script>
  var hist = [], isLoading = false, isRec = false, recognition = null;

  var DAYS = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var n = new Date();
  document.getElementById('topDate').textContent = DAYS[n.getDay()] + ', ' + n.getDate() + ' de ' + MONTHS[n.getMonth()];

  function toggleMic() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('Tu navegador no soporta voz. Usa Chrome.'); return;
    }
    if (isRec) {
      recognition.stop(); return;
    }
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'es-CO';
    recognition.continuous = true;       // sigue escuchando hasta que el usuario para
    recognition.interimResults = true;   // muestra texto mientras habla

    var finalTranscript = '';
    var inp = document.getElementById('msgInput');

    recognition.onstart = function() {
      isRec = true;
      finalTranscript = '';
      document.getElementById('micBtn').classList.add('rec');
    };

    recognition.onresult = function(e) {
      var interim = '';
      for (var i = e.resultIndex; i < e.results.length; i++) {
        var t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          finalTranscript += t + ' ';
        } else {
          interim += t;
        }
      }
      // Muestra texto final + interim en el input
      inp.value = finalTranscript + interim;
      inp.style.height = 'auto';
      inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
    };

    recognition.onend = function() {
      isRec = false;
      document.getElementById('micBtn').classList.remove('rec');
      // Asegura que quede el texto final limpio
      inp.value = finalTranscript.trim();
      inp.style.height = 'auto';
      inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
    };

    recognition.onerror = function(e) {
      isRec = false;
      document.getElementById('micBtn').classList.remove('rec');
      if (e.error !== 'aborted') {
        console.warn('Mic error:', e.error);
      }
    };

    recognition.start();
  }

  async function delTask(id) {
    await fetch('/api/tasks/' + id + '/delete', { method: 'POST' });
    loadTasks();
  }

  async function clearDone() {
    await fetch('/api/tasks/clear-done', { method: 'POST' });
    loadTasks();
    addMsg('ai', 'Tareas completadas eliminadas.', null);
  }

  async function clearAll() {
    if (!confirm('¿Borrar TODAS las tareas?')) return;
    await fetch('/api/tasks/clear-all', { method: 'POST' });
    loadTasks();
    addMsg('ai', 'Todas las tareas eliminadas.', null);
  }

  async function loadTasks() {
    try { var r = await fetch('/api/tasks'); var d = await r.json(); updateUI(d.tasks, d.progress); } catch(e){}
  }

  function updateUI(tasks, prog) {
    var pct = prog.pct || 0, done = prog.done || 0, total = prog.total || 0;
    var circ = 2 * Math.PI * 16;
    document.getElementById('ringFill').style.strokeDasharray = circ;
    document.getElementById('ringFill').style.strokeDashoffset = circ - (pct/100)*circ;
    document.getElementById('ringNum').textContent = pct + '%';
    document.getElementById('progCount').innerHTML = done + ' <span>/ ' + total + '</span>';

    var el = document.getElementById('taskList');
    if (!tasks.length) { el.innerHTML = '<div class="no-tasks">Sin tareas aún.</div>'; return; }
    var pending = tasks.filter(function(t){ return !t.done; });
    var dones = tasks.filter(function(t){ return t.done; });
    var h = '';
    if (pending.length) {
      h += '<div class="section-label">Pendientes</div>';
      pending.forEach(function(t){
        h += '<div class="task-row" onclick="qComplete(' + t.id + ')">' +
          '<div class="t-check"><svg viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg></div>' +
          '<div class="t-name">' + esc(t.name) + '</div>' +
          '<button class="del-btn" onclick="event.stopPropagation();delTask(' + t.id + ')" title="Eliminar">' +
          '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
          '</button></div>';
      });
    }
    if (dones.length) {
      h += '<div class="section-label" style="margin-top:6px">Hechas</div>';
      dones.forEach(function(t){
        h += '<div class="task-row done">' +
          '<div class="t-check"><svg viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg></div>' +
          '<div class="t-name">' + esc(t.name) + '</div>' +
          '<button class="del-btn" onclick="event.stopPropagation();delTask(' + t.id + ')" title="Eliminar">' +
          '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
          '</button></div>';
      });
    }
    el.innerHTML = h;
  }

  async function qComplete(id) {
    await fetch('/api/tasks/' + id + '/complete', { method: 'POST' });
    loadTasks(); addMsg('ai', 'Tarea completada ✓', null);
  }

  function sendSug(el){ document.getElementById('msgInput').value = el.textContent; sendMessage(); }

  async function sendMessage() {
    if (isLoading) return;
    var inp = document.getElementById('msgInput'), text = inp.value.trim();
    if (!text) return;
    var w = document.getElementById('welcome'); if (w) w.remove();
    inp.value = ''; inp.style.height = 'auto';
    addMsg('user', text, null); hist.push({ role:'user', content:text });
    showTyping(); isLoading = true; document.getElementById('sendBtn').disabled = true;
    try {
      var r = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ messages: hist }) });
      var d = await r.json(); removeTyping();
      addMsg('ai', d.message, d.action_result);
      hist.push({ role:'assistant', content: d.message });
      if (d.tasks) updateUI(d.tasks, { pct: d.progress[2], done: d.progress[1], total: d.progress[0] });
    } catch(e) { removeTyping(); addMsg('ai', 'Error de conexión.', null); }
    isLoading = false; document.getElementById('sendBtn').disabled = false;
    document.getElementById('msgInput').focus();
  }

  function addMsg(role, text, action) {
    var c = document.getElementById('messages'), div = document.createElement('div');
    div.className = 'message ' + role;
    var isAi = role === 'ai';
    div.innerHTML =
      '<div class="msg-av ' + (isAi ? 'ai' : 'me') + '">' + (isAi ? 'N' : 'tú') + '</div>' +
      '<div class="msg-body"><div class="msg-who">' + (isAi ? 'Nova' : 'Tú') + '</div>' +
      '<div class="msg-bubble">' + fmt(text) + '</div>' +
      (action ? '<div class="action-tag">⚡ ' + esc(action) + '</div>' : '') + '</div>';
    c.appendChild(div); c.scrollTop = c.scrollHeight;
  }

  function showTyping() {
    var c = document.getElementById('messages'), div = document.createElement('div');
    div.className = 'message ai'; div.id = 'typing';
    div.innerHTML = '<div class="msg-av ai">N</div><div class="msg-body"><div class="msg-who">Nova</div>' +
      '<div class="msg-bubble typing-dots"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div></div>';
    c.appendChild(div); c.scrollTop = c.scrollHeight;
  }

  function removeTyping(){ var t = document.getElementById('typing'); if(t) t.remove(); }

  function fmt(t) {
    return esc(t)
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/`(.*?)`/g,'<code style="background:#ffffff08;padding:1px 6px;border-radius:4px;font-family:DM Mono,monospace;font-size:12px">$1</code>')
      .replace(/\n/g,'<br>');
  }

  function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  document.getElementById('msgInput').addEventListener('input', function(){
    this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 110) + 'px';
  });
  document.getElementById('msgInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
  });

  loadTasks();
</script>
</body>
</html>
