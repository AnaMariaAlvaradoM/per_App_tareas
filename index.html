<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0a0a;
    --surface: #171212;
    --surface2: #211818;
    --border: #2e1f1f;
    --accent: #c0392b;
    --accent2: #e74c3c;
    --accent3: #ff6b6b;
    --accent-glow: #c0392b40;
    --text: #f0eaea;
    --text-muted: #7a6060;
    --user-bubble: #1e1212;
    --ai-bubble: #171212;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%; left: 50%; transform: translateX(-50%);
    width: 500px; height: 300px;
    background: radial-gradient(ellipse, #c0392b0a 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .app-wrapper {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .nova-avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, #8b0000, #c0392b);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    box-shadow: 0 2px 12px #c0392b30;
  }

  .nova-info { flex: 1; }
  .nova-name {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 16px; letter-spacing: -0.3px;
    background: linear-gradient(135deg, #e74c3c, #ff6b6b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .nova-status { font-size: 10px; color: var(--accent3); display: flex; align-items: center; gap: 4px; margin-top: 1px; opacity: 0.8; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent3); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .progress-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .progress-pill:hover { border-color: var(--accent); }
  .pill-bar { width: 48px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .pill-fill {
    height: 100%;
    background: linear-gradient(90deg, #8b0000, #e74c3c);
    border-radius: 2px; transition: width 0.5s ease; width: 0%;
  }
  .pill-text { font-size: 11px; color: var(--text-muted); }
  .pill-text span { color: var(--accent3); }

  .tasks-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
    color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .tasks-btn:hover { border-color: var(--accent); color: var(--text); }
  .tasks-btn.active { border-color: var(--accent); color: var(--accent3); background: #c0392b0a; }

  /* ── DRAWER ── */
  .tasks-drawer {
    overflow: hidden; max-height: 0;
    transition: max-height 0.3s ease;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tasks-drawer.open { max-height: 160px; }
  .tasks-inner {
    padding: 10px 20px;
    display: flex; gap: 6px; flex-wrap: wrap;
    overflow-y: auto; max-height: 160px;
  }
  .task-chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
    font-size: 11px; cursor: pointer; transition: all 0.15s;
  }
  .task-chip:hover { border-color: var(--accent3); color: var(--accent3); }
  .task-chip.done { opacity: 0.35; text-decoration: line-through; cursor: default; }
  .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .task-chip.done .chip-dot { background: var(--text-muted); }
  .no-tasks { font-size: 11px; color: var(--text-muted); font-style: italic; padding: 2px 0; }

  /* ── MENSAJES ── */
  .messages {
    flex: 1; overflow-y: auto;
    padding: 20px; display: flex; flex-direction: column;
    gap: 14px; scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message { display: flex; gap: 8px; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 26px; height: 26px; border-radius: 8px;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 11px; margin-top: 2px;
  }
  .msg-avatar.ai {
    background: linear-gradient(135deg, #8b0000, #c0392b);
    font-size: 13px;
    box-shadow: 0 2px 8px #c0392b25;
  }
  .msg-avatar.user-av {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 9px;
  }

  .msg-content { display: flex; flex-direction: column; gap: 2px; max-width: 85%; }
  .message.user .msg-content { align-items: flex-end; }

  .msg-name { font-size: 9px; color: var(--text-muted); padding: 0 4px; }

  .msg-bubble {
    padding: 10px 14px; border-radius: 14px;
    font-size: 13px; line-height: 1.6; word-break: break-word;
  }
  .message.ai .msg-bubble {
    background: var(--ai-bubble); border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .message.user .msg-bubble {
    background: var(--user-bubble); border: 1px solid #c0392b25;
    border-top-right-radius: 4px;
  }

  .action-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: #c0392b0d; border: 1px solid #c0392b25;
    color: var(--accent3); font-size: 10px;
    padding: 3px 8px; border-radius: 20px; margin-top: 3px;
  }

  .typing-bubble { display: flex; gap: 4px; padding: 12px 14px; align-items: center; }
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2){animation-delay:.2s} .typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-5px);opacity:1} }

  /* Welcome */
  .welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px;
    padding: 40px 20px; text-align: center; margin: auto;
  }
  .welcome-icon {
    width: 60px; height: 60px; border-radius: 20px;
    background: linear-gradient(135deg, #8b0000, #c0392b);
    display: flex; align-items: center; justify-content: center; font-size: 26px;
    box-shadow: 0 8px 32px #c0392b30;
  }
  .welcome h2 {
    font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
    background: linear-gradient(135deg, #e74c3c, #ff6b6b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .welcome p { color: var(--text-muted); font-size: 12px; line-height: 1.7; max-width: 320px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 6px; }
  .suggestion-chip {
    padding: 7px 13px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 20px;
    font-size: 11px; color: var(--text-muted); cursor: pointer;
    transition: all 0.2s; font-family: 'JetBrains Mono', monospace;
  }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--accent3); background: #c0392b0a; }

  /* ── INPUT ── */
  .input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px; padding: 10px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px #c0392b12;
  }

  #messageInput {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 13px; resize: none; max-height: 100px; line-height: 1.5;
  }
  #messageInput::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #8b0000, #c0392b);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 2px 12px #c0392b35;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
  .send-btn svg { width: 14px; height: 14px; fill: white; }

  .input-hint { font-size: 10px; color: var(--text-muted); margin-top: 7px; text-align: center; }

  @media (max-width: 740px) {
    .app-wrapper { max-width: 100%; }
    .pill-bar { display: none; }
  }
  @media (max-width: 480px) {
    .header { padding: 12px 14px; }
    .messages { padding: 14px; gap: 12px; }
    .input-area { padding: 10px 14px 14px; }
    .msg-content { max-width: 90%; }
    .tasks-inner { padding: 8px 14px; }
    .tasks-btn span { display: none; }
  }
</style>
</head>
<body>
<div class="app-wrapper">

  <header class="header">
    <div class="nova-avatar">&#10022;</div>
    <div class="nova-info">
      <div class="nova-name">Nova</div>
      <div class="nova-status"><span class="status-dot"></span>activa</div>
    </div>
    <div class="header-right">
      <div class="progress-pill" onclick="toggleDrawer()" title="Ver tareas">
        <div class="pill-bar"><div class="pill-fill" id="pillFill"></div></div>
        <div class="pill-text"><span id="pillPct">0</span>%</div>
      </div>
      <button class="tasks-btn" id="tasksBtn" onclick="toggleDrawer()">
        &#128203; <span id="pendingCount">0</span> <span>pendientes</span>
      </button>
    </div>
  </header>

  <div class="tasks-drawer" id="tasksDrawer">
    <div class="tasks-inner" id="tasksInner">
      <div class="no-tasks">Sin tareas aun</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">&#10022;</div>
      <h2>Nova</h2>
      <p>Tu asistente personal. Cuentame que tienes pendiente o preguntame como vas.</p>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="sendSuggestion(this)">Como voy hoy?</div>
        <div class="suggestion-chip" onclick="sendSuggestion(this)">Agregar una tarea</div>
        <div class="suggestion-chip" onclick="sendSuggestion(this)">Que hago primero?</div>
        <div class="suggestion-chip" onclick="sendSuggestion(this)">Ver mis tareas</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="messageInput" placeholder="Escribele a Nova..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter para enviar &middot; Shift+Enter para salto de linea</div>
  </div>

</div>
<script>
  var conversationHistory = [];
  var isLoading = false;
  var drawerOpen = false;

  function toggleDrawer() {
    drawerOpen = !drawerOpen;
    document.getElementById('tasksDrawer').classList.toggle('open', drawerOpen);
    document.getElementById('tasksBtn').classList.toggle('active', drawerOpen);
  }

  async function loadTasks() {
    try {
      var r = await fetch('/api/tasks');
      var data = await r.json();
      updateUI(data.tasks, data.progress);
    } catch(e) {}
  }

  function updateUI(tasks, progress) {
    var pct = progress.pct || 0;
    document.getElementById('pillFill').style.width = pct + '%';
    document.getElementById('pillPct').textContent = pct;
    var pending = tasks.filter(function(t){ return !t.done; });
    document.getElementById('pendingCount').textContent = pending.length;
    var inner = document.getElementById('tasksInner');
    if (tasks.length === 0) {
      inner.innerHTML = '<div class="no-tasks">Sin tareas. Cuentale a Nova que tienes pendiente.</div>';
      return;
    }
    inner.innerHTML = tasks.map(function(t) {
      var onclick = t.done ? '' : 'onclick="quickComplete(' + t.id + ')"';
      return '<div class="task-chip ' + (t.done ? 'done' : '') + '" ' + onclick + '>' +
        '<div class="chip-dot"></div>' + escapeHtml(t.name) + '</div>';
    }).join('');
  }

  async function quickComplete(id) {
    await fetch('/api/tasks/' + id + '/complete', { method: 'POST' });
    loadTasks();
    addMessage('ai', 'Tarea completada. Bien hecho!', null);
  }

  function sendSuggestion(el) {
    document.getElementById('messageInput').value = el.textContent;
    sendMessage();
  }

  async function sendMessage() {
    if (isLoading) return;
    var input = document.getElementById('messageInput');
    var text = input.value.trim();
    if (!text) return;
    var welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    input.value = ''; input.style.height = 'auto';
    addMessage('user', text, null);
    conversationHistory.push({ role: 'user', content: text });
    showTyping();
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    try {
      var r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });
      var data = await r.json();
      removeTyping();
      addMessage('ai', data.message, data.action_result);
      conversationHistory.push({ role: 'assistant', content: data.message });
      if (data.tasks) {
        var prog = { pct: data.progress[2], done: data.progress[1], total: data.progress[0] };
        updateUI(data.tasks, prog);
      }
    } catch(e) {
      removeTyping();
      addMessage('ai', 'Error de conexion. Esta corriendo el servidor?', null);
    }
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function addMessage(role, text, actionResult) {
    var container = document.getElementById('messages');
    var div = document.createElement('div');
    div.className = 'message ' + role;
    var isAi = role === 'ai';
    var actionHtml = actionResult ? '<div class="action-chip">&#9889; ' + escapeHtml(actionResult) + '</div>' : '';
    div.innerHTML =
      '<div class="msg-avatar ' + (isAi ? 'ai' : 'user-av') + '">' + (isAi ? '&#10022;' : 'tu') + '</div>' +
      '<div class="msg-content">' +
        '<div class="msg-name">' + (isAi ? 'Nova' : 'Tu') + '</div>' +
        '<div class="msg-bubble">' + formatText(text) + '</div>' +
        actionHtml +
      '</div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    var container = document.getElementById('messages');
    var div = document.createElement('div');
    div.className = 'message ai'; div.id = 'typing';
    div.innerHTML =
      '<div class="msg-avatar ai">&#10022;</div>' +
      '<div class="msg-content"><div class="msg-name">Nova</div>' +
      '<div class="msg-bubble typing-bubble">' +
        '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>' +
      '</div></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() { var t = document.getElementById('typing'); if (t) t.remove(); }

  function formatText(text) {
    return escapeHtml(text)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code style="background:#ffffff0f;padding:1px 5px;border-radius:3px;font-size:12px;">$1</code>')
      .replace(/\n/g, '<br>');
  }

  function escapeHtml(text) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('messageInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });
  document.getElementById('messageInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  loadTasks();
</script>
</body>
</html>
